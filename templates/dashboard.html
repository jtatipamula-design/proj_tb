{% extends "base.html" %}

{% block content %}
<style>
    .dashboard-header {
        margin-bottom: 40px;
    }
    .dashboard-header h1 {
        font-size: 32px;
        font-weight: 600;
        color: var(--color-glacier);
        margin-top: 8px;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 24px;
    }

    .stat-card {
        background: var(--glass-surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 15px 35px -10px rgba(0,0,0,0.3);
    }

    .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .icon-blue { background: rgba(59, 130, 246, 0.15); color: #3B82F6; }
    .icon-purple { background: rgba(139, 92, 246, 0.15); color: #8B5CF6; }
    .icon-green { background: rgba(16, 185, 129, 0.15); color: #10B981; }
    .icon-orange { background: rgba(249, 115, 22, 0.15); color: #F97316; }

    .stat-value {
        font-size: 36px;
        font-weight: 700;
        color: var(--color-glacier);
        font-family: var(--font-mono);
    }

    .stat-label {
        font-size: 14px;
        color: var(--color-fog);
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
</style>

<header class="dashboard-header">
    <p class="eyebrow-text">Overview</p>
    <h1>Welcome back, {{ username.title() if username else 'Admin' }}</h1>
</header>

<section class="stats-grid">
    <article class="stat-card">
        <div class="stat-icon icon-blue"><i data-lucide="users"></i></div>
        <div class="stat-value">{{ stats.emp_count }}</div>
        <div class="stat-label">Total Employees</div>
    </article>

    <article class="stat-card">
        <div class="stat-icon icon-purple"><i data-lucide="building-2"></i></div>
        <div class="stat-value">{{ stats.comp_count }}</div>
        <div class="stat-label">Active Companies</div>
    </article>

    <article class="stat-card">
        <div class="stat-icon icon-green"><i data-lucide="network"></i></div>
        <div class="stat-value">{{ stats.dept_count }}</div>
        <div class="stat-label">Departments</div>
    </article>

    <article class="stat-card">
        <div class="stat-icon icon-orange"><i data-lucide="blocks"></i></div>
        <div class="stat-value">{{ stats.app_count }}</div>
        <div class="stat-label">Integrated Apps</div>
    </article>
</section>
{% endblock %}
