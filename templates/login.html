<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus ERP - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-deep: #0B0F19;
            --bg-card: rgba(30, 41, 59, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --accent-primary: #3B82F6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 24px;
            padding: 50px 40px; width: 100%; max-width: 420px;
            text-align: center;
        }

        .logo-wrap {
            display: inline-flex; align-items: center; justify-content: center;
            width: 64px; height: 64px; border-radius: 16px;
            background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); 
            margin-bottom: 20px; color: var(--accent-primary);
        }

        .login-header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; }
        .login-header p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; }

        .input-group { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); width: 18px;
        }

        input {
            width: 100%; padding: 14px 16px 14px 46px;
            border: 1px solid var(--border-color); border-radius: 12px;
            font-size: 1rem; font-family: inherit;
            background: rgba(0,0,0,0.2); color: white; transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent-primary); background: rgba(0,0,0,0.4); }

        .btn-login {
            width: 100%; padding: 16px; margin-top: 10px;
            background: var(--accent-primary); color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-login:hover { background: #2563EB; }

        #error-msg {
            color: #EF4444; font-size: 0.85rem; font-weight: 500;
            margin-top: 15px; min-height: 20px; opacity: 0;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <header class="login-header">
            <div class="logo-wrap"><i data-lucide="layers"></i></div>
            <h1>Nexus ERP</h1>
            <p>Sign in to your control center</p>
        </header>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <section class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="username" required placeholder="Enter username" autocomplete="username">
                </div>
            </section>

            <section class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
            </section>

            <button type="submit" class="btn-login" id="loginBtn">
                Sign In <i data-lucide="arrow-right" style="width: 18px;"></i>
            </button>
            <div id="error-msg" role="alert">Invalid Credentials</div>
        </form>
    </main>

    <script>
        lucide.createIcons();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error-msg');
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            btn.innerHTML = '<i data-lucide="loader-2" class="lucide-spin" style="width:18px;"></i> Authenticating...';
            lucide.createIcons();
            err.style.opacity = "0";

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username: u, password: p})
                });

                if (res.ok) {
                    btn.innerHTML = '<i data-lucide="check-circle-2" style="width:18px;"></i> Success';
                    btn.style.background = "#10B981";
                    lucide.createIcons();
                    setTimeout(() => window.location.href = "/", 600);
                } else {
                    const data = await res.json();
                    err.innerText = data.error || "Invalid Credentials";
                    err.style.opacity = "1";
                    btn.innerHTML = 'Sign In <i data-lucide="arrow-right" style="width: 18px;"></i>';
                    lucide.createIcons();
                }
            } catch (error) {
                err.innerText = "Network Error";
                err.style.opacity = "1";
                btn.innerHTML = 'Sign In <i data-lucide="arrow-right" style="width: 18px;"></i>';
                lucide.createIcons();
            }
        }
    </script>
</body>
</html>
