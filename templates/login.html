<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus ERP - Login</title>
    <!-- AuthKit Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --color-midnight-ink: #05060f;
            --color-graphite-plate: #2f343e;
            --color-steel-border: #3f4959;
            --color-fog: #81899b;
            --color-pebble: #9da7ba;
            --color-moonlight: #c7d3ea;
            --color-glacier: #d8ecf8;
            --color-frost-link: #b6d9fc;
            --color-electric-iris: #663af3;
            --color-ember: #e46d4c;

            --font-ui: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            --shadow-subtle-4: inset 0px 1px 1px 0px rgba(199, 211, 234, 0.12), inset 0px 24px 48px 0px rgba(199, 211, 234, 0.05), 0px 24px 32px 0px rgba(6, 6, 14, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-ui);
            background-color: var(--color-midnight-ink);
            color: var(--color-moonlight);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden; position: relative;
            letter-spacing: -0.01em;
            /* AuthKit Blueprint Grid */
            background-image: 
                linear-gradient(rgba(186, 215, 247, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(186, 215, 247, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        svg.lucide { stroke-width: 1.5px; }

        /* AuthKit Blueprint Glow (Top Center Radial) */
        .blueprint-glow {
            position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
            width: 800px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(186, 207, 247, 0.08) 0%, transparent 70%);
            pointer-events: none; z-index: 1;
        }

        /* Hero Text Lockup */
        .hero-lockup {
            text-align: center; margin-bottom: 40px; z-index: 10; position: relative;
        }
        .hero-eyebrow {
            font-family: var(--font-mono); font-size: 15px; color: var(--color-fog);
            letter-spacing: 0.1em; margin-bottom: 16px;
        }
        .hero-title {
            font-size: 48px; font-weight: 500; color: #ffffff;
            line-height: 1.14; margin-bottom: 16px; letter-spacing: normal;
        }
        .hero-subtitle {
            font-size: 18px; color: var(--color-pebble); font-weight: 400;
        }

        /* AuthKit Graphite Plate Card */
        .login-card {
            background: var(--color-graphite-plate);
            border: 1px solid var(--color-steel-border);
            border-radius: 10px;
            padding: 32px 24px; width: 100%; max-width: 380px;
            box-shadow: var(--shadow-subtle-4);
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 10;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-group { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 20px; }
        .input-group label { font-size: 14px; font-weight: 500; color: var(--color-moonlight); }

        /* AuthKit 2px Radius Inputs */
        input {
            width: 100%; padding: 10px 12px; border: 1px solid var(--color-steel-border);
            border-radius: 2px; font-size: 14px; font-family: var(--font-ui);
            background-color: var(--color-midnight-ink); color: white;
            box-shadow: inset 0px 0px 0px 1px rgba(186, 215, 247, 0.06); transition: all 0.2s;
        }
        input:focus {
            outline: none; border-color: var(--color-frost-link);
            box-shadow: 0 0 0 1px var(--color-frost-link), inset 0px 0px 0px 1px rgba(186, 215, 247, 0.12);
        }

        /* AuthKit Electric Iris CTA */
        .btn-login {
            width: 100%; padding: 10px 16px; margin-top: 10px;
            background: var(--color-electric-iris); color: white;
            border: none; border-radius: 2px;
            font-size: 16px; font-weight: 500; font-family: var(--font-ui);
            cursor: pointer; box-shadow: none; transition: background 0.2s;
            display: flex; justify-content: center; align-items: center; gap: 8px; line-height: 1.5;
        }
        .btn-login:hover { background: #7a52f5; }

        #error-msg {
            color: var(--color-ember); font-size: 14px; font-weight: 500;
            margin-top: 15px; min-height: 20px; opacity: 0; transition: opacity 0.3s; text-align: center;
        }
    </style>
</head>
<body>

    <div class="blueprint-glow"></div>

    <div class="hero-lockup">
        <div class="hero-eyebrow">NEXUS ERP</div>
        <h1 class="hero-title">Sign In</h1>
        <p class="hero-subtitle">Access your enterprise control center.</p>
    </div>

    <div class="login-card">
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" required placeholder="admin" autocomplete="username">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Continue
            </button>
            <div id="error-msg">Invalid Credentials</div>
        </form>
    </div>

    <script>
        lucide.createIcons();

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('error-msg');
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            btn.innerHTML = '<i data-lucide="loader-2" class="lucide-spin" style="width:16px;"></i> Authenticating...';
            lucide.createIcons();
            err.style.opacity = "0";

            try {
                const res = await fetch("/login", {
                    method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: u, password: p})
                });

                if (res.ok) {
                    btn.innerHTML = '<i data-lucide="check" style="width:16px;"></i> Success';
                    lucide.createIcons();
                    btn.style.background = "var(--color-cipher-mint)";
                    setTimeout(() => window.location.href = "/", 600);
                } else {
                    const data = await res.json();
                    err.innerText = data.error || "Invalid Credentials";
                    err.style.opacity = "1";
                    btn.innerHTML = 'Continue';
                }
            } catch (error) {
                err.innerText = "Network Error";
                err.style.opacity = "1";
                btn.innerHTML = 'Continue';
            }
        }
    </script>
</body>
</html>
