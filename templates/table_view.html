{% extends "base.html" %}

{% block content %}
<style>
    /* Header Layout */
    .table-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .table-header h1 { margin: 0; color: var(--text-main); font-size: 1.8rem; }
    
    /* Controls (Search, Add, Export) */
    .controls { display: flex; gap: 12px; align-items: center; }
    .search-input {
        padding: 10px 15px; border: 1px solid var(--border-color);
        border-radius: 8px; background: var(--bg-body); color: var(--text-main);
        min-width: 250px; transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: #3b82f6; }

    /* Action Buttons */
    .btn-action {
        padding: 10px 20px; border-radius: 8px; font-weight: 600; text-decoration: none; 
        color: white; transition: background 0.2s; white-space: nowrap;
    }
    .btn-export { background: #10b981; } .btn-export:hover { background: #059669; }
    .btn-add { background: #3b82f6; } .btn-add:hover { background: #2563eb; }
    
    .btn-edit { 
        background: #f59e0b; color: white; padding: 6px 14px; 
        border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: bold; 
    }
    .btn-edit:hover { background: #d97706; }

    /* --- THE ANTI-SQUISH & STICKY TABLE LOGIC --- */
    .table-wrapper {
        background: var(--bg-card); border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        border: 1px solid var(--border-color);
        overflow-x: auto; /* Enables horizontal scrolling for wide tables */
        max-height: 70vh;
        overflow-y: auto;
    }
    
    table { width: 100%; border-collapse: collapse; white-space: nowrap; }
    th, td { padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border-color); color: var(--text-main); }
    th { background: var(--hover-bg); font-weight: 600; position: sticky; top: 0; z-index: 10; cursor: pointer; user-select: none; }
    th:hover { color: #3b82f6; }

    /* 🔥 SENIOR UX: Sticky First Column for Edit Actions */
    .sticky-col {
        position: sticky; 
        left: 0; 
        background: var(--bg-card); 
        z-index: 11; /* Stays above normal scrolling cells */
        border-right: 2px solid var(--border-color); 
        text-align: center;
    }
    th.sticky-col { 
        background: var(--hover-bg); 
        z-index: 12; /* Corner cell needs to stay above everything */
    }
</style>

<div class="table-header">
    <h1>{{ table_title }}</h1>
    <div class="controls">
        <input type="text" id="searchInput" class="search-input" placeholder="Search any column..." onkeyup="filterTable()">
        <a href="/export/{{ table_name }}" class="btn-action btn-export">Export CSV</a>
        <a href="/new/{{ table_name }}" class="btn-action btn-add">+ Add New</a>
    </div>
</div>

<div class="table-wrapper">
    <table id="dataTable">
        <thead>
            <tr>
                <!-- Edit Action moved to the First Column -->
                <th class="sticky-col">Action</th>
                {% for col in columns %}
                <!-- FIXED: Used data-index attribute to pacify the VS Code JS Linter -->
                <th data-index="{{ loop.index }}" onclick="sortTable(parseInt(this.dataset.index))">{{ col.label }} ↕</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                <!-- Edit button locked securely to the left wall -->
                <td class="sticky-col">
                    <a href="/edit/{{ table_name }}/{{ row[pk_column] }}" class="btn-edit">Edit</a>
                </td>
                {% for col in columns %}
                <td>{{ row[col.raw] }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    // Real-time Search Filter
    function filterTable() {
        let filter = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#dataTable tbody tr");
        rows.forEach(row => {
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    }

    // Dynamic Column Sorting Logic
    let sortDir = {};
    function sortTable(n) {
        let table = document.getElementById("dataTable");
        let tbody = table.tBodies[0];
        let rows = Array.from(tbody.querySelectorAll("tr"));
        sortDir[n] = !sortDir[n]; // Toggle direction
        let dir = sortDir[n] ? 1 : -1;

        rows.sort((a, b) => {
            let valA = a.cells[n].innerText.trim();
            let valB = b.cells[n].innerText.trim();
            let isNum = !isNaN(parseFloat(valA)) && isFinite(valA) && valA !== '';
            
            if (isNum) return (parseFloat(valA) - parseFloat(valB)) * dir;
            return valA.localeCompare(valB) * dir;
        });
        
        rows.forEach(row => tbody.appendChild(row));
    }
</script>
{% endblock %}
