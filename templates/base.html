<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Admin</title>
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            /* Deep Dark Mode Palette */
            --bg-deep: #0B0F19;
            --bg-glass: rgba(15, 23, 42, 0.65);
            --bg-card: rgba(30, 41, 59, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --accent-primary: #3B82F6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --accent-success: #10B981;
            --accent-danger: #EF4444;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.05), transparent 25%);
        }

        /* --- GLASSMORPHISM SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .brand {
            padding: 30px 24px;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-menu {
            padding: 20px 12px;
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .user-profile {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: white;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            max-width: calc(100vw - 260px);
        }

        /* --- COMMAND PALETTE (CMD+K) --- */
        .cmd-palette-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: none; justify-content: center; align-items: flex-start;
            padding-top: 15vh; opacity: 0; transition: opacity 0.2s;
        }
        .cmd-palette-overlay.active { display: flex; opacity: 1; }
        
        .cmd-palette {
            background: #1E293B; width: 100%; max-width: 600px;
            border-radius: 16px; border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transform: scale(0.95); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cmd-palette-overlay.active .cmd-palette { transform: scale(1); }

        .cmd-input-wrap { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; }
        .cmd-input {
            width: 100%; background: transparent; border: none;
            color: white; font-size: 1.2rem; font-family: var(--font-main);
        }
        .cmd-input:focus { outline: none; }
        .cmd-results { max-height: 300px; overflow-y: auto; padding: 10px; }
        .cmd-result-item {
            padding: 12px 16px; border-radius: 8px; color: var(--text-muted);
            text-decoration: none; display: flex; align-items: center; gap: 12px;
        }
        .cmd-result-item:hover, .cmd-result-item.selected { background: rgba(255,255,255,0.05); color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <i data-lucide="layers"></i> Nexus ERP
        </div>
        <div class="nav-menu" id="sidebarMenu">
            <a href="/" class="nav-item {% if not table_name %}active{% endif %}">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </a>
            <div style="margin: 15px 0 5px 16px; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Data Tables</div>
            {% for tbl in all_tables %}
            <a href="/table/{{ tbl }}" class="nav-item {% if table_name == tbl %}active{% endif %}" data-search="{{ tbl.replace('phc_', '').replace('_t', '').replace('_', ' ') }}">
                <i data-lucide="database"></i> {{ tbl.replace('phc_', '').replace('_t', '').replace('_', ' ').title() }}
            </a>
            {% endfor %}
        </div>
        <div class="user-profile">
            <div class="avatar">{{ username[0]|upper if username else 'U' }}</div>
            <div style="flex-grow: 1;">
                <div style="font-size: 0.9rem; font-weight: 700; color: white;">{{ username.title() if username else 'User' }}</div>
                <a href="/logout" style="font-size: 0.8rem; color: var(--accent-danger); text-decoration: none; font-weight: 600;">Log Out</a>
            </div>
        </div>
    </div>

    <!-- COMMAND PALETTE -->
    <div class="cmd-palette-overlay" id="cmdPalette">
        <div class="cmd-palette">
            <div class="cmd-input-wrap">
                <i data-lucide="search" style="color: var(--text-muted);"></i>
                <input type="text" class="cmd-input" id="cmdInput" placeholder="Search tables or type a command..." autocomplete="off">
                <div style="font-size: 0.7rem; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; color: var(--text-muted);">ESC</div>
            </div>
            <div class="cmd-results" id="cmdResults">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // COMMAND PALETTE LOGIC
        const overlay = document.getElementById('cmdPalette');
        const input = document.getElementById('cmdInput');
        const results = document.getElementById('cmdResults');
        const navItems = Array.from(document.querySelectorAll('.nav-menu .nav-item[data-search]'));

        document.addEventListener('keydown', (e) => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                overlay.classList.add('active');
                input.focus();
                input.value = '';
                filterCmd('');
            }
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                overlay.classList.remove('active');
            }
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('active');
        });

        input.addEventListener('input', (e) => filterCmd(e.target.value.toLowerCase()));

        function filterCmd(query) {
            results.innerHTML = '';
            navItems.forEach(item => {
                const text = item.getAttribute('data-search').toLowerCase();
                if (text.includes(query)) {
                    const el = document.createElement('a');
                    el.href = item.href;
                    el.className = 'cmd-result-item';
                    el.innerHTML = `<i data-lucide="arrow-right" style="width: 16px;"></i> Go to ${item.innerText}`;
                    results.appendChild(el);
                }
            });
            lucide.createIcons();
        }
    </script>
</body>
</html>
